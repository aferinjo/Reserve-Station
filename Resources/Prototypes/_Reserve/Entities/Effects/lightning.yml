- type: entity
  id: EffectLightning1
  components:
  - type: Sprite
    sprite: _Reserve/Effects/lightning.rsi
    drawdepth: Effects
    noRot: true
    layers:
    - state: lightning_1
      shader: unshaded
  - type: Transform
    anchored: false
  - type: TimedDespawn
    lifetime: 0.5
