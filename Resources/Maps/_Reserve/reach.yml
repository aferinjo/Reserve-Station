        2. Убедитесь, что экипаж им следует, и в конце смены составьте отчет.

        3. Старайтесь помочь экипажу в выполнении их целей.


        Примеры:

        - Отдайте ученому диск с очками исследований, проводившихся на прошлых сменах. Он лежит у вас на шкафу.

        - Предоставьте сервису доступ в коморку уборщика, если его нет среди экипажа.

        - Попросите бармена и повара приготовить свежей еды на весь экипаж.
